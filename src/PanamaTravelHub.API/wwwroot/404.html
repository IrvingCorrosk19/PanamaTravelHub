<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — ToursPanama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <style>
    .error-page {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .error-card {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .error-emoji {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .error-code {
      font-size: 6rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.04em;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text, #1e293b);
      margin-bottom: 0.75rem;
    }
    .error-description {
      font-size: 1rem;
      color: var(--text-muted, #64748b);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9375rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: white;
      color: var(--text, #1e293b);
      border: 2px solid rgba(226, 232, 240, 0.8);
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9375rem;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-back:hover {
      border-color: rgba(14, 165, 233, 0.4);
      color: #0ea5e9;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner wrap">
      <div class="brand">
        <div class="mark"></div>
        <a href="/"><span class="brand-text">ToursPanama</span></a>
      </div>
      <div class="nav-links">
        <a href="/" class="nav-link">Tours</a>
        <a href="/blog.html" class="nav-link">Blog</a>
        <a href="/login.html" class="nav-link" id="loginLink">Iniciar Sesión</a>
      </div>
    </div>
  </nav>

  <div class="error-page">
    <div class="error-card">
      <div class="error-emoji">🗺️</div>
      <div class="error-code">404</div>
      <h1 class="error-title">Página no encontrada</h1>
      <p class="error-description">
        Parece que este tour o página no existe o ha sido removido.<br>
        Explora nuestros destinos disponibles.
      </p>
      <div class="error-actions">
        <a href="/" class="btn-home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Ver Tours
        </a>
        <button onclick="history.back()" class="btn-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Volver
        </button>
      </div>
    </div>
  </div>
</body>
</html>
